site_name: Dokumentacja Apisense
site_url: https://abelo-smartbee.github.io/apisense-docs/

theme:
  name: material
  language: pl
  custom_dir: docs/overrides
  logo: assets/branding/apisense-logo.png
  palette:
    - scheme: default
      primary: amber
      accent: orange
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - content.code.copy

plugins:
  - search
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      languages:
        - locale: pl
          name: PL
          build: true
          default: true
          link: /
          site_name: Dokumentacja Apisense
          nav:
            - Start: index.md
            - Opis systemu: overview/index.md
            - Asystent:
                - Przegląd: ai/index.md
                - Pełny opis: ai/assistant.md
                - Możliwości i prywatność: ai/limits-privacy.md
            - Instrukcja aplikacji: manual/app-manual.md
            - Instrukcja konfiguracji: manual/configuration/index.md
            - FAQ: faq/index.md
        - locale: en
          name: EN
          build: true
          link: /en/
          site_name: Apisense Documentation
          nav:
            - Home: index.md
            - System Overview: overview/index.md
            - Assistant:
                - Overview: ai/index.md
                - Full description: ai/assistant.md
                - Capabilities & Privacy: ai/limits-privacy.md
            - App Manual: manual/app-manual.md
            - Configuration Manual: manual/configuration/index.md
            - FAQ: faq/index.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Opis systemu: overview/index.md
  - Asystent:
      - Przegląd: ai/index.md
      - Pełny opis: ai/assistant.md
      - Możliwości i prywatność: ai/limits-privacy.md
  - Instrukcja aplikacji: manual/app-manual.md
  - Instrukcja konfiguracji: manual/configuration/index.md
  - FAQ: faq/index.md

extra_css:
  - assets/stylesheets/extra.css
