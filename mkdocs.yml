site_name: Dokumentacja Apisense
site_url: https://abelo-smartbee.github.io/apisense-docs/

theme:
  name: material
  language: pl
  custom_dir: docs/overrides
  logo: assets/branding/apisense-logo.png
  palette:
    - scheme: default
      primary: amber
      accent: orange
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - content.code.copy

plugins:
  - search
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      languages:
        - locale: pl
          name: PL
          build: true
          default: true
          link: /
          site_name: Dokumentacja Apisense
          nav:
            - Start: index.md
            - Opis systemu: overview/index.md
            - Asystent:
                - Przegląd: ai/index.md
                - Możliwości i prywatność: ai/limits-privacy.md
            - Instrukcje:
                - Aplikacja Apisense Pro AI: manual/app-manual.md
                - Konfiguracja sprzętu:
                    - Przegląd: manual/configuration/index.md
                    - Konfiguracja w skrócie: manual/configuration/quick-guide.md
                    - Rozwiązywanie problemów: manual/configuration/troubleshooting.md
                    - Dobre praktyki: manual/configuration/best-practices.md
            - Badania:
                - Przegląd: procedures/index.md
                - Mikroskopia Nosema/Vairimorpha: procedures/nosema-microscopy.md
                - Sugar roll na Varroa: procedures/varroa-sugar-roll.md
                - Kwestionariusz zdrowia rodziny: procedures/health-questionnaire.md
            - Do pobrania: downloads/index.md
            - FAQ: faq/index.md
        - locale: en
          name: EN
          build: true
          link: /en/
          site_name: Apisense Documentation
          nav:
            - Home: index.md
            - System Overview: overview/index.md
            - Assistant:
                - Overview: ai/index.md
                - Capabilities & Privacy: ai/limits-privacy.md
            - Manuals:
                - Apisense Pro AI app: manual/app-manual.md
                - Hardware configuration:
                    - Overview: manual/configuration/index.md
                    - Quick Guide: manual/configuration/quick-guide.md
                    - Troubleshooting: manual/configuration/troubleshooting.md
                    - Best Practices: manual/configuration/best-practices.md
            - Lab procedures:
                - Overview: procedures/index.md
                - Nosema/Vairimorpha microscopy: procedures/nosema-microscopy.md
                - Varroa sugar roll: procedures/varroa-sugar-roll.md
                - Colony health questionnaire: procedures/health-questionnaire.md
            - Downloads: downloads/index.md
            - FAQ: faq/index.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Opis systemu: overview/index.md
  - Asystent:
      - Przegląd: ai/index.md
      - Możliwości i prywatność: ai/limits-privacy.md
  - Instrukcje:
      - Aplikacja Apisense Pro AI: manual/app-manual.md
      - Konfiguracja sprzętu:
          - Przegląd: manual/configuration/index.md
          - Konfiguracja w skrócie: manual/configuration/quick-guide.md
          - Rozwiązywanie problemów: manual/configuration/troubleshooting.md
          - Dobre praktyki: manual/configuration/best-practices.md
  - Badania:
      - Przegląd: procedures/index.md
      - Mikroskopia Nosema/Vairimorpha: procedures/nosema-microscopy.md
      - Sugar roll na Varroa: procedures/varroa-sugar-roll.md
      - Kwestionariusz zdrowia rodziny: procedures/health-questionnaire.md
  - Do pobrania: downloads/index.md
  - FAQ: faq/index.md

extra_css:
  - assets/stylesheets/extra.css

hooks:
  - hooks/mirror_assets.py
