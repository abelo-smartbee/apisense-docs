site_name: Dokumentacja Apisense
site_url: https://abelo-smartbee.github.io/apisense-docs/
repo_url: https://github.com/abelo-smartbee/apisense-docs
repo_name: abelo-smartbee/apisense-docs

theme:
  name: material
  language: pl
  logo: assets/logo.svg
  palette:
    - scheme: default
      primary: amber
      accent: orange
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - content.code.copy

plugins:
  - search
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      languages:
        - locale: pl
          name: PL
          build: true
          default: true
          link: /
          site_name: Dokumentacja Apisense
          nav:
            - Start: index.md
            - Opis systemu: overview/index.md
            - Instrukcja aplikacji: manual/app-manual.md
            - Instrukcja konfiguracji: manual/configuration/index.md
        - locale: en
          name: EN
          build: true
          link: /en/
          site_name: Apisense Documentation
          nav:
            - Home: index.md
            - System Overview: overview/index.md
            - App Manual: manual/app-manual.md
            - Configuration Manual: manual/configuration/index.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Opis systemu: overview/index.md
  - Instrukcja aplikacji: manual/app-manual.md
  - Instrukcja konfiguracji: manual/configuration/index.md

extra_css:
  - assets/stylesheets/extra.css
